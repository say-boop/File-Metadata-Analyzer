<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Metadata Analyzer</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="app-container">
		<h1>📄 Metadata Analyzer</h1>
		
		<form id="scan-form">
			<input type="text" id="directory" placeholder="C:\Users\User\Documents" required>
			<button type="submit" id="submit-btn">
				<span class="icon">🔍</span>
				<span class="spinner"></span>
				<span class="btn-text">Scan</span>
			</button>
		</form>
		
		<p id="status"></p>
		
		<div id="export-btns" style="display:none;">
			<a href="/report/json" class="btn">📄 Download JSON</a>
			<a href="/report/html" class="btn">🌐 Download HTML</a>
		</div>
		
		<div id="results"></div>
	</div>
    
  <script src="/static/js/app.js"></script>
</body>
</html>
